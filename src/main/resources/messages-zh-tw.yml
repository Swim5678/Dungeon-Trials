help:
  header: "<gold>=== Dungeon Trials ==="
  start: "<yellow>/dt start [關卡] [結構]</yellow> <gray>- 開始副本(關卡 1-5,省略時使用預設結構)</gray>"
  next: "<yellow>/dt next [關卡]</yellow> <gray>- 推進到更高關卡;L5 不帶參數會跳到 L6(無盡模式)</gray>"
  stay: "<yellow>/dt stay</yellow> <gray>- 拒絕升關,重置當前關卡的擊殺計數</gray>"
  exit: "<yellow>/dt exit</yellow> <gray>- 離開副本,返回主世界出生點</gray>"
  stats: "<yellow>/dt stats [structures]</yellow> <gray>- 顯示你的 session 統計(或各結構的細項)</gray>"
  top: "<yellow>/dt top [結構] [數量]</yellow> <gray>- 顯示排行榜(預設前 10,最多 50;省略時使用預設結構)</gray>"
  invite: "<yellow>/dt invite <玩家></yellow> <gray>- 邀請玩家加入你的副本</gray>"
  visit: "<yellow>/dt visit <玩家></yellow> <gray>- 接受邀請,加入對方的副本</gray>"
  decline: "<yellow>/dt decline</yellow> <gray>- 拒絕待處理的邀請</gray>"
  leave: "<yellow>/dt leave</yellow> <gray>- 離開你正在拜訪的副本</gray>"
  kick: "<yellow>/dt kick <訪客></yellow> <gray>- 將訪客踢出你的副本(僅副本主人)</gray>"
  infinite: "<yellow>/dt infinite</yellow> <gray>- 接受 L5 通關後出現的 L6 無盡模式提示</gray>"
  end: "<yellow>/dt end</yellow> <gray>- 結束你的 session(訪客會被送回主世界)</gray>"
  reload: "<yellow>/dt reload</yellow> <gray>- 重新載入設定(管理員)</gray>"
  help: "<yellow>/dt help</yellow> <gray>- 顯示此說明</gray>"

