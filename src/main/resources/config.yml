# =============================================================================
# Dungeon Trials — 關卡與生怪配置
# =============================================================================
# 結構說明
#   levels.<structureId>.<N>     結構專屬關卡覆寫(1-5)。
#                                找不到 <N> 時,沿用 L5 的 mob 列表,
#                                每升一級 clear-requirement +12
#                                (見 ConfigManager.getEffectiveLevelConfig)。
#   levels.<N>                   全域 fallback(向後相容舊版設定)。
#                                當同 N 同時出現在全域與結構專屬時,以結構專屬為準。
#   clear-requirement            擊殺數門檻,達標後可晉升下一關。
#   mobs[].type                  Bukkit EntityType 枚舉名(例如 ZOMBIE、SKELETON、
#                                BREEZE、CAVE_SPIDER、SLIME、VINDICATOR、EVOKER、
#                                PILLAGER、VEX、SPIDER...)。
#   mobs[].profile               SpawnProfile 枚舉名(完整列表見下方速查表)。
#                                公式中的「n」= 當下副本世界內「非旁觀、在線」玩家數,
#                                每個生怪 tick 重新計算。
#
# =============================================================================
# SpawnProfile 速查表(6 個內建 profile;完整定義見 SpawnProfile.java)
# =============================================================================
# 公式欄位格式:interval ticks(秒) | totalCap(n) | simCap(n)
# 公式中的 n = 當前 session 在線、非旁觀玩家數(每個生怪 tick 重算)。
#
#  profile        interval     totalCap     simCap              典型用途
#  ----------     ----------   ----------   -----------------   ---------------------
#  DEFAULT        40 (2.0s)    n+4          max(1,(n+1)/2+1)    通用低壓填充
#  JUVENILE       20 (1.0s)    n+4          max(1,(n+3)/2)      較弱中階 mob
#  BASIC          20 (1.0s)    n+4          max(1,(n+4)/2)      多數關卡主力
#  HEAVY          20 (1.0s)    n+8          max(1,(n+6)/2)      重裝/坦克 mob
#  SLOW_RANGED    160 (8.0s)   n+4          n+2                 慢速遠程壓制
#  VEX            20 (1.0s)    n+3          max(1,(n+3)/2)      召喚物群(不隨關卡放大)
#
# --- 範例:n=1、3、5 玩家時的實際 cap 與間隔 ---
#
#  profile        n=1                  n=3                  n=5
#                  total/sim  間隔      total/sim  間隔      total/sim  間隔
#  ----------     ----------  ------    ----------  ------    ----------  ------
#  DEFAULT         5 /  2    2.0s       7 /  3     2.0s       9 /  4     2.0s
#  JUVENILE        5 /  2    1.0s       7 /  3     1.0s       9 /  4     1.0s
#  BASIC           5 /  2    1.0s       7 /  3     1.0s       9 /  4     1.0s
#  HEAVY           9 /  3    1.0s      11 /  4     1.0s      13 /  5     1.0s
#  SLOW_RANGED     5 /  3    8.0s       7 /  5     8.0s       9 /  7     8.0s
#  VEX             4 /  2    1.0s       6 /  3     1.0s       8 /  4     1.0s
#
# 注意:
#   - simCap 是「同一個 profile 同時存活上限」,與其他 profile 互相獨立。
#     若同關卡有多條 mobs[] 共用同一 profile,各自套用 cap
#     (例如兩條 DEFAULT 各自 totalCap 5、simCap 2)。
#   - 全域硬上限 MAX_ALIVE = 30 永遠優先(見 MobService),跨所有 profile 加總。
#   - simCap/totalCap 公式皆使用整數除法;若算式結果 ≤0,simCap 會 clamp 至 1。
#
# --- levelIntensityMultiplier 縮放(L6+ infinite 模式才生效) ---
#   level <= 5            : 倍率 = 1.0
#   level >= 6, 單人      : 每多 1 級 +0.10
#   level >= 6, 多人      : 每多 1 位玩家(>1)+0.05(累加於 level 部分)
#   simCap / totalCap 乘法(round 取整);intervalTicks 除法(下取整,最低 5 tick)
#   例:L7 單人 mult = 1.20 → JUVENILE 間隔 round(20/1.20)=16 tick(0.8s),
#                        simCap = round(2*1.20)=2,totalCap = round(5*1.20)=6
# =============================================================================

levels:
  # ---- Trial Chambers:vanilla trial_spawner 合法池,難度遞增 ----
  trial_chambers:
    1:
      clear-requirement: 6
      mobs:
        - type: ZOMBIE
          profile: JUVENILE
    2:
      clear-requirement: 8
      mobs:
        - type: BREEZE
          profile: DEFAULT
        - type: ZOMBIE
          profile: DEFAULT
        - type: SKELETON
          profile: DEFAULT
    3:
      clear-requirement: 12
      mobs:
        - type: ZOMBIE
          profile: DEFAULT
        - type: SKELETON
          profile: DEFAULT
        - type: CAVE_SPIDER
          profile: DEFAULT
        - type: BREEZE
          profile: DEFAULT
    4:
      clear-requirement: 16
      mobs:
        - type: ZOMBIE
          profile: DEFAULT
        - type: SKELETON
          profile: DEFAULT
        - type: CAVE_SPIDER
          profile: DEFAULT
        - type: BREEZE
          profile: DEFAULT
        - type: STRAY
          profile: DEFAULT
    5:
      clear-requirement: 30
      mobs:
        - type: ZOMBIE
          profile: HEAVY
        - type: HUSK
          profile: DEFAULT
        - type: SKELETON
          profile: DEFAULT
        - type: STRAY
          profile: DEFAULT
        - type: BOGGED
          profile: DEFAULT
        - type: CAVE_SPIDER
          profile: DEFAULT
        - type: BREEZE
          profile: DEFAULT

  # ---- Woodland Mansion:全 illagers 主題,不加 ravager/allay ----
  # vanilla mansion 主要住民:Vindicator(1F/走廊)、Evoker(2F+ 大房)、
  # Pillager(哨兵)、Vex(Evoker 召喚物);蜘蛛房以 SPIDER 表示。
  woodland_mansion:
    1:
      clear-requirement: 6
      mobs:
        - type: VINDICATOR
          profile: JUVENILE
    2:
      clear-requirement: 8
      mobs:
        - type: VINDICATOR
          profile: DEFAULT
    3:
      clear-requirement: 12
      mobs:
        - type: VINDICATOR
          profile: DEFAULT
        - type: VINDICATOR
          profile: HEAVY
        - type: PILLAGER
          profile: DEFAULT
    4:
      clear-requirement: 16
      mobs:
        - type: VINDICATOR
          profile: DEFAULT
        - type: VINDICATOR
          profile: HEAVY
        - type: PILLAGER
          profile: DEFAULT
        - type: EVOKER
          profile: DEFAULT
    5:
      clear-requirement: 30
      mobs:
        - type: VINDICATOR
          profile: HEAVY
        - type: PILLAGER
          profile: DEFAULT
        - type: EVOKER
          profile: DEFAULT
        - type: VEX
          profile: VEX
        - type: SPIDER
          profile: DEFAULT

# =============================================================================
# 全域設定(啟動時載入,可用 /dt reload 重新讀取)
# =============================================================================
settings:
  # /dt exit、斷線、死亡等情境的「安全返程」世界。
  main-world: overworld
  # 介面語系。會載入對應的 messages-<locale>.yml(例如 messages-zh-tw.yml)。
  # 留空或 "default" 等同使用 messages-en.yml(英文)。找不到對應檔時退回英文。
  locale: "zh-tw"
  # /dt start 預設使用的結構 ID。對應 StructureRegistry 內註冊的 id
  # (目前內建 trial_chambers、woodland_mansion)。
  # 可用 /dt start <level> <structure> 覆寫。
  default-structure: trial_chambers
  # 單一 dungeon 最多允許的訪客數(不含擁有者本人)。
  # 設 1 等同關閉訪客系統。最低 1,低於 1 會被 clamp 並 log warning。
  max-visitors: 3
  # /dt top 排行榜查詢結果的 Caffeine 快取秒數。
  # 設太低會增加 DB 負載,太高則新紀錄上榜有延遲。範圍 1-3600。
  top-cache-seconds: 120

# =============================================================================
# 獎勵系統(per-kill 掉落 / 過關禮 / infinite 加成)
# =============================================================================
#   enabled              是否啟用整個 reward 系統。false 時全部失效。
#   per-kill.xp-multiplier
#                        套用於 vanilla 怪物經驗掉落(event.setDroppedExp)。
#                        1.0 = 不變,2.0 = 雙倍,0.5 = 半倍。< 0 會 clamp 為 0。
#   per-kill.custom-drops.<EntityType>
#                        殺死特定怪物時的自訂掉落清單。
#                        每筆設定:material (Bukkit Material 名稱) / min / max / chance (0.0-1.0)。
#                        命中機率後,從 min..max 隨機抽數量。
#                        走 Player.getInventory().addItem(...),爆倉時自動掉地。
#   level-clear-bonus.<L1..L5>
#                        達到 clear-requirement 晉級瞬間,給一次該等級的獎勵。
#                        例:升上 L2 時觸發 L1 的獎勵。L5 → infinite 模式不觸發本項。
#   infinite-bonus.enabled
#                        infinite 模式時,每次 advanceLevel 是否發放獎勵。
#   infinite-bonus.entries
#                        infinite 模式每次晉級給的獎勵清單(格式同 per-kill)。
# =============================================================================
rewards:
  enabled: false
  per-kill:
    xp-multiplier: 1.0
    custom-drops:
      ZOMBIE:
        - { material: ROTTEN_FLESH, min: 1, max: 2, chance: 1.0 }
        - { material: CARROT, min: 1, max: 1, chance: 0.10 }
      SKELETON:
        - { material: BONE, min: 1, max: 2, chance: 1.0 }
        - { material: ARROW, min: 1, max: 3, chance: 0.50 }
      BREEZE:
        - { material: BREEZE_ROD, min: 1, max: 2, chance: 0.50 }
      EVOKER:
        - { material: TOTEM_OF_UNDYING, min: 1, max: 1, chance: 0.05 }
  level-clear-bonus:
    L1: [ ]
    L2:
      - { material: GOLD_INGOT, min: 1, max: 1, chance: 1.0 }
    L3:
      - { material: GOLD_INGOT, min: 1, max: 3, chance: 1.0 }
    L4:
      - { material: IRON_INGOT, min: 1, max: 2, chance: 1.0 }
    L5:
      - { material: DIAMOND, min: 1, max: 2, chance: 1.0 }
  infinite-bonus:
    enabled: true
    entries:
      - { material: NETHERITE_SCRAP, min: 1, max: 1, chance: 0.30 }
  # 動態光源:玩家主/副手持有火把時,在玩家座標上放置一個
  # Material.LIGHT 方塊(亮度由 light-level 決定)。
  # 玩家停止持火把時(下一個 tick)還原為 AIR。
  # 適用於所有世界,不受 dungeon 限制。
  # 訪客(visitor)、spectator 模式自動跳過(後者因 spectator 本不持物)。
  dynamic-light-source:
    enabled: true
    # LIGHT 方塊亮度,範圍 0-15。超出範圍會自動 clamp 並 log warning。
    light-level: 14
    # 是否偵測主手持有的火把。
    mainhand: true
    # 是否偵測副手持有的火把。
    offhand: true
